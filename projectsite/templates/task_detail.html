{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ task.title }} | Hangarin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">{{ task.title }}</h3>
                        <span class="badge bg-warning text-dark">{{ task.priority.name }}</span>
                    </div>
                    <div class="card-body p-4">
                        <h6 class="text-muted">Category: {{ task.category.name }}</h6>
                        <hr>
                        <p class="lead">{{ task.description }}</p>
                        <div class="mt-4">
                            <p><strong>Status:</strong> {{ task.status }}</p>
                            <p><strong>Deadline:</strong> {{ task.deadline|date:"F d, Y" }}</p>
                        </div>
                    </div>
                    <div class="card-footer bg-white">
                        <a href="{% url 'task-list' %}" class="btn btn-outline-secondary">← Back to List</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
